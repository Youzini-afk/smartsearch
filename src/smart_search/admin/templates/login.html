<!DOCTYPE html>
<html lang="{{ locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('login.title') }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 12px; padding: 2.5rem; width: 420px; max-width: 90vw; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand h1 { font-size: 1.4rem; color: #1a1a2e; }
        .brand p { font-size: 0.85rem; color: #888; margin-top: 0.3rem; }
        .lang-row { text-align: center; margin-bottom: 1rem; }
        .lang-row a { color: #4fc3f7; font-size: 0.85rem; text-decoration: none; }
        .lang-row a:hover { text-decoration: underline; }
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 1.5rem; }
        .tab { flex: 1; padding: 0.6rem; text-align: center; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { color: #1a1a2e; border-bottom-color: #4fc3f7; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; }
        .form-group input { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
        .form-group input:focus { border-color: #4fc3f7; outline: none; box-shadow: 0 0 0 2px rgba(79,195,247,0.2); }
        .btn { width: 100%; padding: 0.7rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600; background: #1a1a2e; color: #fff; }
        .btn:hover { background: #2d2d4e; }
        .error-msg { background: #ffebee; color: #c62828; padding: 0.6rem 0.8rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
        .error-msg.show { display: block; }
        .hint { font-size: 0.8rem; color: #999; margin-top: 0.3rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <h1>{{ t('login.title') }}</h1>
            <p>{{ t('login.subtitle') }}</p>
        </div>

        <div class="lang-row">
            <a href="?lang={{ other_locale }}">{{ other_locale_label }}</a>
        </div>

        {% if error %}
        <div class="error-msg show">{{ t('login.auth_failed') }}</div>
        {% else %}
        <div class="error-msg" id="errorMsg"></div>
        {% endif %}

        <div class="tabs">
            <div class="tab active" onclick="switchTab('key')">{{ t('login.tab_key') }}</div>
            <div class="tab" onclick="switchTab('password')">{{ t('login.tab_password') }}</div>
        </div>

        <form method="POST" action="/admin/login" id="keyForm" class="tab-panel active">
            <input type="hidden" name="type" value="key">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="form-group">
                <label for="keyInput">{{ t('login.api_token') }}</label>
                <input type="password" id="keyInput" name="key" placeholder="sk_live_..." autocomplete="off">
                <p class="hint">{{ t('login.enter_admin_token') }}</p>
            </div>
            <button type="submit" class="btn">{{ t('login.sign_in_key') }}</button>
        </form>

        <form method="POST" action="/admin/login" id="passwordForm" class="tab-panel">
            <input type="hidden" name="type" value="password">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="form-group">
                <label for="pwInput">{{ t('login.admin_password') }}</label>
                <input type="password" id="pwInput" name="password" placeholder="{{ t('login.enter_password') }}" autocomplete="current-password">
                <p class="hint">{{ t('login.password_hint') }}</p>
            </div>
            <button type="submit" class="btn">{{ t('login.sign_in_password') }}</button>
        </form>
    </div>

    <script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(function(t, i) {
            t.classList.toggle('active', (tab === 'key' && i === 0) || (tab === 'password' && i === 1));
        });
        document.getElementById('keyForm').classList.toggle('active', tab === 'key');
        document.getElementById('passwordForm').classList.toggle('active', tab === 'password');
    }
    </script>
</body>
</html>
