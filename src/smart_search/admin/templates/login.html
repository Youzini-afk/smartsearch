<!DOCTYPE html>
<html lang="{{ locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('login.title') }}</title>
    <style>
        :root {
            --color-brand: #0f172a;
            --color-brand-light: #1e293b;
            --color-accent: #06b6d4;
            --color-accent-dim: #0891b2;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
            --color-bg: #f8fafc;
            --color-surface: #ffffff;
            --color-border: #e2e8f0;
            --color-text-primary: #0f172a;
            --color-text-secondary: #475569;
            --color-text-muted: #64748b;
            --color-text-dim: #94a3b8;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-modal: 0 20px 60px rgba(15,23,42,0.15);
            --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--color-text-primary);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 48px;
            width: 440px;
            max-width: 92vw;
            box-shadow: var(--shadow-modal);
            animation: fadeUp 0.3s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-brand { text-align: center; margin-bottom: 32px; }
        .login-brand-icon {
            width: 48px; height: 48px;
            background: var(--color-accent);
            border-radius: var(--radius-md);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.3rem; font-weight: 800; color: #fff;
            margin-bottom: 16px;
        }
        .login-brand h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--color-text-primary);
        }
        .login-brand p {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-top: 4px;
        }
        .login-lang {
            text-align: center; margin-bottom: 20px;
            font-size: 0.8rem;
        }
        .login-lang a { color: var(--color-accent); text-decoration: none; }
        .login-lang a:hover { text-decoration: underline; }
        .login-tabs {
            display: flex;
            border-bottom: 2px solid var(--color-border);
            margin-bottom: 24px;
        }
        .login-tab {
            flex: 1; padding: 10px;
            text-align: center; cursor: pointer;
            font-size: 0.85rem; font-weight: 600;
            color: var(--color-text-muted);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.15s;
        }
        .login-tab:hover { color: var(--color-text-primary); }
        .login-tab.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }
        .login-panel { display: none; }
        .login-panel.active { display: block; }
        .login-error {
            background: #fef2f2; color: #991b1b;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
        }
        .login-error.show { display: block; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: var(--font-body);
            color: var(--color-text-primary);
            background: var(--color-surface);
            transition: border-color 0.15s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(6,182,212,0.1);
        }
        .form-hint {
            font-size: 0.72rem;
            color: var(--color-text-dim);
            margin-top: 4px;
        }
        .btn {
            width: 100%;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            background: var(--color-brand);
            color: #fff;
            transition: background 0.15s;
        }
        .btn:hover { background: var(--color-brand-light); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <div class="login-brand-icon">S</div>
            <h1>{{ t('login.title') }}</h1>
            <p>{{ t('login.subtitle') }}</p>
        </div>

        <div class="login-lang">
            <a href="?lang={{ other_locale }}">{{ other_locale_label }}</a>
        </div>

        {% if error %}
        <div class="login-error show">{{ t('login.auth_failed') }}</div>
        {% else %}
        <div class="login-error" id="errorMsg"></div>
        {% endif %}

        <div class="login-tabs">
            <div class="login-tab active" onclick="switchTab('key')">{{ t('login.tab_key') }}</div>
            <div class="login-tab" onclick="switchTab('password')">{{ t('login.tab_password') }}</div>
        </div>

        <form method="POST" action="/admin/login" id="keyForm" class="login-panel active">
            <input type="hidden" name="type" value="key">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="form-group">
                <label for="keyInput">{{ t('login.api_token') }}</label>
                <input type="password" id="keyInput" name="key" placeholder="sk_live_..." autocomplete="off">
                <div class="form-hint">{{ t('login.enter_admin_token') }}</div>
            </div>
            <button type="submit" class="btn">{{ t('login.sign_in_key') }}</button>
        </form>

        <form method="POST" action="/admin/login" id="passwordForm" class="login-panel">
            <input type="hidden" name="type" value="password">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="form-group">
                <label for="pwInput">{{ t('login.admin_password') }}</label>
                <input type="password" id="pwInput" name="password" placeholder="{{ t('login.enter_password') }}" autocomplete="current-password">
                <div class="form-hint">{{ t('login.password_hint') }}</div>
            </div>
            <button type="submit" class="btn">{{ t('login.sign_in_password') }}</button>
        </form>
    </div>

    <script>
    function switchTab(tab) {
        document.querySelectorAll('.login-tab').forEach(function(t, i) {
            t.classList.toggle('active', (tab === 'key' && i === 0) || (tab === 'password' && i === 1));
        });
        document.getElementById('keyForm').classList.toggle('active', tab === 'key');
        document.getElementById('passwordForm').classList.toggle('active', tab === 'password');
    }
    </script>
</body>
</html>
